# configs/realesrgan_x4.yaml
# Real-ESRGAN ×4 — tuned for GTX 1650 (4 GB VRAM)

model:
  name: realesrgan
  scale: 4
  num_rrdb_blocks: 6      # Paper: 23; reduced for 4 GB VRAM
  num_feat: 64
  num_grow_ch: 32

data:
  hr_patch_size: 128
  batch_size: 8
  patches_per_image: 10
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  cache_in_memory: false
  train_dir: data/DIV2K_train_HR
  val_dir: data/DIV2K_val_HR
  degradation:
    blur_sigma: [0.2, 3.0]
    noise_sigma: [0.0, 0.1]
    jpeg_quality: [30, 95]

training:
  epochs: 50
  lr: 2.0e-4
  lr_min: 1.0e-6
  grad_accumulation_steps: 4
  mixed_precision: true
  gradient_checkpointing: false
  early_stopping_patience: 10
  seed: 42

optimisation:
  export_onnx: true
  build_tensorrt: true
  fp16_trt: true
  int8_trt: false

logging:
  mlflow_uri: "http://localhost:5000"
  experiment_name: "realesrgan_x4"
  log_every_n_steps: 10
  checkpoint_every_n_epochs: 5
  checkpoint_dir: experiments/realesrgan
