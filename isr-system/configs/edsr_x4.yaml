# configs/edsr_x4.yaml
# EDSR ×4 — lighter model, larger batch size possible

model:
  name: edsr
  scale: 4
  num_res_blocks: 16      # Paper: 32; reduced for VRAM
  num_feats: 64
  res_scale: 0.1          # Residual scaling trick from EDSR paper

data:
  hr_patch_size: 96
  batch_size: 16
  patches_per_image: 10
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  cache_in_memory: true   # HR fits in 16 GB RAM; eliminates disk I/O
  train_dir: data/DIV2K_train_HR
  val_dir: data/DIV2K_val_HR

training:
  epochs: 60
  lr: 1.0e-4
  lr_min: 1.0e-7
  grad_accumulation_steps: 2
  mixed_precision: true
  gradient_checkpointing: false
  early_stopping_patience: 12
  seed: 42

optimisation:
  export_onnx: true
  build_tensorrt: true
  fp16_trt: true
  int8_trt: false

logging:
  mlflow_uri: "http://localhost:5000"
  experiment_name: "edsr_x4"
  log_every_n_steps: 10
  checkpoint_every_n_epochs: 5
  checkpoint_dir: experiments/edsr
