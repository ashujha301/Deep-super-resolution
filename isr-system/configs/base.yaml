system:
  device: "cuda"            # "cpu" | "cuda" | "cpp_cuda"
  backend: "cupy"           # "numpy" | "cupy" | "cpp"
  seed: 42
  num_workers: 4

model:
  name: "srcnn"
  scale_factor: 2
  num_channels: 3

training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  patch_size: 48

data:
  dataset: "div2k"
  train_dir: "data/train"
  val_dir: "data/val"

logging:
  level: "INFO"
  experiment_tracker: "mlflow"